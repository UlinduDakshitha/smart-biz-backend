# Server
server.port=8080
spring.application.name=smartbiz-backend

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/smartbiz_db2?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Ulindu@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=SmartBizSecretKey2024SuperSecureLongKeyForJWTTokenGeneration
jwt.expiration=86400000

# OpenAI
openai.api.key=your_openai_api_key_here
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-3.5-turbo

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Email (Gmail SMTP — use App Password if 2FA is enabled)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_gmail@gmail.com
spring.mail.password=your_gmail_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=noreply@smartbiz.com

# Cache (Caffeine — for OTP storage, 5-minute TTL)
spring.cache.type=caffeine
spring.cache.cache-names=otpCache
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=5m

# Email (Gmail SMTP — update with your credentials)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# App base URL (used in emails)
app.base-url=http://localhost:3000

# Logging
logging.level.com.smartbiz=DEBUG
logging.level.org.springframework.security=DEBUG
